# ─────────────────────────────────────────────────────────────────────────────
#  HQG Security SOC Platform — Production Nginx Configuration
#
#  Setup:
#    sudo cp nginx.conf /etc/nginx/sites-available/soc-watchdog
#    sudo ln -s /etc/nginx/sites-available/soc-watchdog /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Before enabling, generate the Base64 credential string for OpenSearch:
#    echo -n "soc-readonly:YOUR_PASSWORD" | base64
#  Replace OPENSEARCH_B64_CREDENTIALS below with the result.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;   # Replace with your domain or VPS IP

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── React SPA ────────────────────────────────────────────────────────────
    root  /var/www/soc-watchdog/dist;
    index index.html;

    # Aggressive caching for hashed static assets
    location ~* \.(js|css|woff2?|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every unmatched path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── OpenSearch proxy ─────────────────────────────────────────────────────
    # Proxies /api/os/* → OpenSearch with credentials injected server-side.
    # The browser NEVER sees the OpenSearch password.
    #
    # IMPORTANT: Replace OPENSEARCH_B64_CREDENTIALS with the output of:
    #   echo -n "soc-readonly:YOUR_PASSWORD" | base64
    location /api/os/ {
        rewrite ^/api/os(/.*)?$ $1 break;

        proxy_pass         https://127.0.0.1:9200;
        proxy_ssl_verify   off;   # set to on + proxy_ssl_trusted_certificate if using CA

        proxy_set_header Authorization  "Basic OPENSEARCH_B64_CREDENTIALS";
        proxy_set_header Host           "localhost";
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header Content-Type   $http_content_type;

        proxy_read_timeout  15s;
        proxy_connect_timeout 5s;
    }

    # ── GeoIP proxy (ip-api.com) ─────────────────────────────────────────────
    # Forwards /api/geoip/* → ip-api.com so the browser avoids CORS issues.
    # Rate limit: ip-api.com free tier allows 45 req/min per IP.
    location /api/geoip/ {
        rewrite ^/api/geoip(/.*)?$ $1 break;

        proxy_pass         http://ip-api.com;
        proxy_set_header   Host "ip-api.com";

        proxy_read_timeout 10s;
    }
}
